# ZeroBot — nginx reverse proxy config
# Serves the dashboard on port 80/443 with SSL
#
# Usage:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/zerobot
#   sudo ln -s /etc/nginx/sites-available/zerobot /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d yourdomain.com   (for free SSL)
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # replace with your domain or server IP

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;   # keep WebSocket alive

        # Optional: uncomment to add nginx-level basic auth on top
        # auth_basic           "ZeroBot Dashboard";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }
}

